<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prediction Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Glass Card */
.card {
    width: 420px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    text-align: center;
    animation: fadeIn 0.8s ease-in-out;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

h2 {
    margin-bottom: 20px;
}

/* Risk Badge */
.badge {
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 20px;
    font-weight: bold;
    display: inline-block;
    margin-bottom: 15px;
}

.low { background: #00c853; }
.medium { background: #ffab00; }
.high { background: #d50000; }

/* Info Box */
.info {
    margin: 10px 0;
    font-size: 16px;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* Back Link */
a {
    display: inline-block;
    margin-top: 20px;
    color: #ddd;
    text-decoration: none;
}

a:hover {
    color: white;
}

</style>
</head>

<body>

<div class="card">

<h2>❤️ Heart Disease Prediction</h2>

<!-- ERROR -->
{% if error %}
    <h3 style="color:#ff4b2b;">{{ error }}</h3>

{% else %}

<!-- RESULT -->
<div class="badge {{ category|lower|replace(' ', '') }}">
    {{ category }}
</div>

<div class="info"><b>Risk Score:</b> {{ risk_score }}%</div>
<div class="info"><b>Probability:</b> {{ probability }}</div>

<!-- REPORT BUTTON -->
<form action="/report" method="POST">
    <input type="hidden" name="risk_score" value="{{ risk_score }}">
    <input type="hidden" name="category" value="{{ category }}">
    <input type="hidden" name="probability" value="{{ probability }}">
    <button>📄 Download Report</button>
</form>

{% endif %}

<a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
