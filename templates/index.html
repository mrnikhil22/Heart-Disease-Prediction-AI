<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Risk Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    height: 100vh;
}

.container {
    width: 900px;
    margin: 30px auto;
    background: #ffffff;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #ff416c;
    margin-bottom: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

label {
    font-weight: 500;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-top: 5px;
}

.full {
    grid-column: span 2;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.header span {
    font-size: 40px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <span>❤️</span>
    <h1>Heart Disease Risk Analyzer</h1>
</div>

<form action="/predict" method="POST">
<div class="form-grid">

<div>
<label>Age</label>
<input type="number" name="age" required>
</div>

<div>
<label>Gender</label>
<select name="gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div>
<label>Chest Pain</label>
<select name="chestpain">
<option value="0">Typical</option>
<option value="1">Atypical</option>
<option value="2">Non-anginal</option>
<option value="3">Asymptomatic</option>
</select>
</div>

<div>
<label>Resting BP</label>
<input type="number" name="restingBP" required>
</div>

<div>
<label>Cholesterol</label>
<input type="number" name="serumcholestrol" required>
</div>

<div>
<label>Fasting Sugar</label>
<select name="fastingbloodsugar">
<option value="1">>120</option>
<option value="0"><=120</option>
</select>
</div>

<div>
<label>Rest ECG</label>
<select name="restingrelectro">
<option value="0">Normal</option>
<option value="1">Abnormal</option>
<option value="2">Hypertrophy</option>
</select>
</div>

<div>
<label>Max Heart Rate</label>
<input type="number" name="maxheartrate" required>
</div>

<div>
<label>Exercise Angina</label>
<select name="exerciseangia">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div>
<label>Oldpeak</label>
<input type="number" step="0.1" name="oldpeak" required>
</div>

<div>
<label>Slope</label>
<select name="slope">
<option value="0">Up</option>
<option value="1">Flat</option>
<option value="2">Down</option>
</select>
</div>

<div>
<label>Major Vessels</label>
<input type="number" name="noofmajorvessels" required>
</div>

<div>
<label>Thal</label>
<select name="thal">
<option value="1">Normal</option>
<option value="2">Fixed</option>
<option value="3">Reversible</option>
</select>
</div>

<div class="full">
<button type="submit">🚀 Predict Risk</button>
</div>

</div>
</form>

</div>

</body>
</html>
